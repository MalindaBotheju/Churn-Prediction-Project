<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-100 via-indigo-50 to-purple-100 min-h-screen flex items-center justify-center font-sans py-10">

    <div class="bg-white/95 backdrop-blur-sm p-8 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] max-w-2xl w-full border-t-4 border-t-indigo-500">
        
        <div class="mb-8 text-center">
            <h2 class="text-3xl font-extrabold text-gray-800 tracking-tight">Churn Predictor <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-600">AI</span></h2>
            <p class="text-sm text-gray-500 mt-2">Enter customer details below to evaluate their retention risk.</p>
        </div>
        
        <form method="POST" action="/" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Tenure (Months)</label>
                    <input type="number" name="tenure" required 
                           value="{{ tenure_val if tenure_val != None else '' }}"
                           class="block w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-gray-800 shadow-sm focus:bg-white focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 transition">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Monthly Charges ($)</label>
                    <input type="number" step="0.01" name="monthly_charges" required 
                           value="{{ monthly_charges_val if monthly_charges_val != None else '' }}"
                           class="block w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-gray-800 shadow-sm focus:bg-white focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 transition">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Contract Type</label>
                    <select name="contract" class="block w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-gray-800 shadow-sm focus:bg-white focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 transition">
                        <option value="Month-to-month" {% if contract_val == 'Month-to-month' %}selected{% endif %}>Month-to-month</option>
                        <option value="One year" {% if contract_val == 'One year' %}selected{% endif %}>One year</option>
                        <option value="Two year" {% if contract_val == 'Two year' %}selected{% endif %}>Two year</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Internet Service</label>
                    <select name="internet_service" class="block w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-gray-800 shadow-sm focus:bg-white focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 transition">
                        <option value="DSL" {% if internet_service_val == 'DSL' %}selected{% endif %}>DSL</option>
                        <option value="Fiber optic" {% if internet_service_val == 'Fiber optic' %}selected{% endif %}>Fiber optic</option>
                        <option value="No" {% if internet_service_val == 'No' %}selected{% endif %}>No Internet</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Tech Support</label>
                    <select name="tech_support" class="block w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-gray-800 shadow-sm focus:bg-white focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 transition">
                        <option value="No" {% if tech_support_val == 'No' %}selected{% endif %}>No</option>
                        <option value="Yes" {% if tech_support_val == 'Yes' %}selected{% endif %}>Yes</option>
                        <option value="No internet service" {% if tech_support_val == 'No internet service' %}selected{% endif %}>No internet service</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Online Security</label>
                    <select name="online_security" class="block w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-gray-800 shadow-sm focus:bg-white focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 transition">
                        <option value="No" {% if online_security_val == 'No' %}selected{% endif %}>No</option>
                        <option value="Yes" {% if online_security_val == 'Yes' %}selected{% endif %}>Yes</option>
                        <option value="No internet service" {% if online_security_val == 'No internet service' %}selected{% endif %}>No internet service</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Paperless Billing</label>
                    <select name="paperless_billing" class="block w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-gray-800 shadow-sm focus:bg-white focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 transition">
                        <option value="Yes" {% if paperless_billing_val == 'Yes' %}selected{% endif %}>Yes</option>
                        <option value="No" {% if paperless_billing_val == 'No' %}selected{% endif %}>No</option>
                    </select>
                </div>

            </div> 
            
            <div class="mt-8 flex space-x-4">
                <a href="/" class="w-1/3 flex justify-center items-center py-3 px-4 border border-gray-200 rounded-lg shadow-sm text-sm font-bold text-gray-600 bg-gray-50 hover:bg-gray-100 hover:text-gray-800 transition duration-150 ease-in-out">
                    Clear
                </a>
                
                <button type="submit" class="w-2/3 flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-md text-sm font-bold text-white bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150 ease-in-out transform hover:-translate-y-0.5">
                    Analyze Customer Risk
                </button>
            </div>
        </form>

        {% if prediction is not none %}
        <div class="mt-8 p-6 rounded-xl text-center shadow-inner {% if prediction %} bg-red-50 border border-red-100 {% else %} bg-emerald-50 border border-emerald-100 {% endif %} animate-[pulse_0.5s_ease-in-out]">
            <h3 class="text-2xl font-extrabold tracking-tight {% if prediction %} text-red-600 {% else %} text-emerald-600 {% endif %}">
                {% if prediction %} ⚠️ HIGH RISK OF CHURN {% else %} ✅ SAFE CUSTOMER {% endif %}
            </h3>
            <p class="mt-2 text-lg font-medium text-gray-600">Churn Probability: <span class="font-bold {% if prediction %} text-red-700 {% else %} text-emerald-700 {% endif %}">{{ probability }}%</span></p>
        </div>
        {% endif %}
    </div>

</body>
</html>
